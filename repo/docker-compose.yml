services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dispatchlearn
      MYSQL_USER: dispatchlearn
      MYSQL_PASSWORD: dispatchlearn_secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 30
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --log-bin=mysql-bin
      --binlog-expire-logs-seconds=900
      --server-id=1

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      GIN_MODE: "release"
      DB_HOST: "mysql"
      DB_PORT: "3306"
      DB_USER: "dispatchlearn"
      DB_PASSWORD: "dispatchlearn_secret"
      DB_NAME: "dispatchlearn"
      JWT_SECRET: "dispatchlearn-jwt-secret-change-in-production"
      JWT_MAX_SESSIONS: "10"
      ENCRYPTION_MASTER_KEY: "0123456789abcdef0123456789abcdef"
      ENABLE_TLS: "${ENABLE_TLS:-true}"
      TLS_CERT_FILE: "/certs/server.crt"
      TLS_KEY_FILE: "/certs/server.key"
      QUOTA_RPM: "600"
      QUOTA_BURST: "120"
      QUOTA_WEBHOOK_DAILY: "10000"
      BACKUP_DIR: "/app/backups"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DB_HOST: "mysql"
      DB_PORT: "3306"
      DB_USER: "dispatchlearn"
      DB_PASSWORD: "dispatchlearn_secret"
      DB_NAME: "dispatchlearn"
      JWT_SECRET: "dispatchlearn-jwt-secret-change-in-production"
      ENCRYPTION_MASTER_KEY: "0123456789abcdef0123456789abcdef"
      APP_HOST: "app"
      APP_PORT: "8080"
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    profiles:
      - test

volumes:
  mysql_data:
